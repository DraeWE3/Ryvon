name: Workflow Engine Cron

on:
  schedule:
    # Runs every 5 minutes
    - cron: '*/5 * * * *'
  # Allows manual runs from the GitHub Actions tab
  workflow_dispatch:

jobs:
  trigger-workflows:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cron Endpoint
        env:
          # You must add CRON_SECRET and PRODUCTION_URL to your GitHub Repository Secrets
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.PRODUCTION_URL }}
        run: |
          echo "Pinging $APP_URL/api/cron/workflows"
          curl -X GET "$APP_URL/api/cron/workflows" \
          -H "Authorization: Bearer $CRON_SECRET"
          echo "Ping complete!"
